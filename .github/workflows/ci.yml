name: CI

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  release-hygiene:
    name: Release Hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Check tracked files for local auth data
        run: npm run check:release-hygiene

  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Zig test
        run: |
          zig version
          zig test src/main.zig -lc

  package-host-smoke:
    name: Package Host Smoke
    runs-on: ubuntu-latest
    env:
      RELEASE_HOST_ROOT: ${{ runner.temp }}/codex-auth-release-host

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Build Linux x64 binary
        run: zig build -Dtarget=x86_64-linux-gnu -Doptimize=ReleaseSafe

      - name: Stage host artifact tree
        shell: bash
        run: |
          mkdir -p "${RELEASE_HOST_ROOT}/artifacts/linux-x64/binary"
          cp "zig-out/bin/codex-auth" "${RELEASE_HOST_ROOT}/artifacts/linux-x64/binary/codex-auth"

      - name: Validate host packaging smoke
        run: >
          npm run check:release-host --
          --artifacts-dir "${RELEASE_HOST_ROOT}/artifacts"
          --output-dir "${RELEASE_HOST_ROOT}/dist/npm"
          --packed-dir "${RELEASE_HOST_ROOT}/dist/packed"
          --smoke-dir "${RELEASE_HOST_ROOT}/dist/smoke"

  desktop-linux-check:
    name: Desktop Linux Check
    runs-on: ubuntu-latest
    env:
      HOME: ${{ runner.temp }}/codex-auth-desktop-home

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install desktop npm dependencies
        run: npm --prefix apps/codex-auth-desktop ci

      - name: Check Linux desktop app
        run: npm run desktop:linux:check

  desktop-windows-check:
    name: Desktop Windows Check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install desktop npm dependencies
        run: npm --prefix apps/codex-auth-desktop ci

      - name: Check Windows desktop app
        run: npm run desktop:windows:check
